<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		body,h1,h2,h3,p{margin:0; padding: 0}
		.img-wrap{position: relative;}
		.img-wrap .uni{width: 100%; display: block;}
		.img-wrap .book{width: 80%; position: absolute;  display: block; top: 5%; left: 11%}
		.img-wrap .inben{width: 30%; position: absolute;  display: block; top: 14%; left: 52%}
		.img-wrap .book1{width: 7.5%; position: absolute;  display: block; top: 25.4%; left: 58.1%}
		.img-wrap .book2{width: 8%; position: absolute;  display: block; top: 25.5%; left: 68%}
		.img-wrap .book3{width: 8%; position: absolute;  display: block; top: 47%; left: 58.1%}
		.img-wrap .book4{width: 8%; position: absolute;  display: block; top: 47%; left: 68%}
		.img-wrap .bleft{width: 28%; position: absolute;  display: block; top: 15.5%; left: 21.5%}

		   
    	.img-wrap .tooltip{
        position: fixed;      
        display: none;         
        pointer-events: none;  
        z-index: 999;
        width: 15%;           
        transform: translate(-50%, -110%);  
    }




	</style>
	<title></title>
</head>
<body>
	<section>
	<div class="img-wrap">
		<img src="img1.png" class="uni">
		<img src="img2.png" class="book">
		<img src="img3.png" class="inben">
		<img src="img4.png" class="book1" id="trigger">
		<img src="img5.png" class="book2" id="trigger2">
		<img src="img6.png" class="book3" id="trigger3">
		<img src="img7.png" class="book4" id="trigger4">
		<img src="img8.png" class="bleft">
 		<img src="img9.png" class="tooltip" id="tooltip">
 		<img src="img10.png"class="tooltip" id="tooltip2">
 		<img src="img11.png"class="tooltip" id="tooltip3">
 		<img src="img12.png"class="tooltip" id="tooltip4">				


	</div>
	<script>
    
    const pairs = [
        { trigger: 'trigger',  tooltip: 'tooltip',  link: 'https://mgjstoto.github.io/prohibitedbooks_3/' },
        { trigger: 'trigger2', tooltip: 'tooltip2', link: null },  
        { trigger: 'trigger3', tooltip: 'tooltip3', link: null },
        { trigger: 'trigger4', tooltip: 'tooltip4', link: null },
    ];

    pairs.forEach(({ trigger, tooltip, link }) => {
        const t = document.getElementById(trigger);
        const tt = document.getElementById(tooltip);

        t.addEventListener('mousemove', (e) => {
            tt.style.display = 'block';
            tt.style.left = e.clientX + 'px';
            tt.style.top  = e.clientY + 'px';
        });

        t.addEventListener('mouseleave', () => {
            tt.style.display = 'none';
        });

        
        if (link) {
            t.addEventListener('click', () => {
                window.location.href = link;
            });
        }
    });
</script>
</section>

</body>
</html>
