<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		h1,h2,h3,p{margin:0; padding: 0}
	    body{  margin: 0; padding: 0;  overflow-x: hidden; background: #000;}
	    .img-wrap { position: relative; width: 100vw; height: 100vh; background-image: url('img1.png');
			background-size: cover; background-position: center;}

		.book-wrap {
			position: absolute;
			width: 80vw;
			top: 3vh;
			left: 11vw;
		}
        .book-wrap .book {
			width: 100%;  
			display: block;
			position: relative;
		}

	    .book-wrap img {
			position: absolute;
			display: block;
		}

		.inben{width: 36%; position: absolute;  display: block; top: 14%; left: 52%}

		 .book1{width: 9.5%; position: absolute;  display: block; top: 25%; left: 58.5%}
		 .book2{width: 10%; position: absolute;  display: block; top: 25%; left: 71%}
		 .book3{width: 10%; position: absolute;  display: block; top: 52.5%; left: 58.6%}
		 .book4{width: 10%; position: absolute;  display: block; top: 52.5%; left: 71%}
		 .bleft{width: 20%; position: absolute;  display: block; top: 19%; left: 20%}
		 .bleft2{width: 26%; position: absolute;  display: block; top: 31%; left: 17.5%}
		 .bleft3{width: 29%; position: absolute;  display: block; top: 45%; left: 15.5%}
		 .bleft4{width: 25%; position: absolute;  display: block; top: 42.8%; left: 17.5%}
		   
    	.img-wrap .tooltip{
        position: fixed;      
        display: none;         
        pointer-events: none;  
        z-index: 999;
        width: 15%;           
        transform: translate(-50%, -110%);  
    }




	</style>
	<title></title>
</head>
<body>
	<section>
	<div class="img-wrap">
		<div class="book-wrap"> 
			<img src="img2.png" class="book">
			<img src="img3.png" class="inben">
			<img src="img4.png" class="book1" id="trigger">
			<img src="img5.png" class="book2" id="trigger2">
			<img src="img6.png" class="book3" id="trigger3">
			<img src="img7.png" class="book4" id="trigger4">
			<img src="img13.png" class="bleft">
			<img src="img14.png" class="bleft2">
		    <img src="img16.png" class="bleft3">
		    <img src="img15.png" class="bleft4">
	 		<img src="img9.png" class="tooltip" id="tooltip">
	 		<img src="img10.png"class="tooltip" id="tooltip2">
	 		<img src="img11.png"class="tooltip" id="tooltip3">
	 		<img src="img12.png"class="tooltip" id="tooltip4">				

	 	</div> 
	</div>
	<script>
    
    const pairs = [
        { trigger: 'trigger',  tooltip: 'tooltip',  link: 'https://mgjstoto.github.io/prohibitedbooks_3/' },
        { trigger: 'trigger2', tooltip: 'tooltip2', link: 'https://mgjstoto.github.io/prohibitedbooks_4/'},  
        { trigger: 'trigger3', tooltip: 'tooltip3', link: 'https://mgjstoto.github.io/prohibitedbooks_5/' },
        { trigger: 'trigger4', tooltip: 'tooltip4', link: 'https://mgjstoto.github.io/prohibitedbooks_6/' },
    ];

    pairs.forEach(({ trigger, tooltip, link }) => {
        const t = document.getElementById(trigger);
        const tt = document.getElementById(tooltip);

        t.addEventListener('mousemove', (e) => {
            tt.style.display = 'block';
            tt.style.left = e.clientX + 'px';
            tt.style.top  = e.clientY + 'px';
        });

        t.addEventListener('mouseleave', () => {
            tt.style.display = 'none';
        });

        
        if (link) {
            t.addEventListener('click', () => {
                window.location.href = link;
            });
        }
    });
</script>
</section>

</body>
</html>
